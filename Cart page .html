<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - Velvet Vogue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
   body {
      font-family: Gothic;
      background: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(17, 17, 17, 0.6);
      color: #fff;
      padding: 2.7rem 2rem;
      z-index: 1000;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    nav a {
      color: #fff;
      margin-right: 1rem;
      text-decoration: none;
    }

    .page-header {
      
      min-height: 45vh;
      padding: 10rem 1rem 4rem;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

   .page-header h1 {
  font-size: 2rem;
  font-weight: bold; /* or any value like 500, 600, etc. */
  color: black;
}


    .container {
      margin-top: 7rem;
    }

    .btn i {
      margin-right: 8px;
    }

    footer {
      background: #111;
      color: #ccc;
      padding: 3rem;
      text-align: center;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header class="d-flex justify-content-between align-items-center">
    <h2>Velvet Vogue</h2>
    <nav>
      <a href="new velvet vogue .html">Home</a>
      <a href="Women.html">Women</a>
      <a href="men.html">Men</a>
      <a href="kidss.html">Kids</a>
      <a href="Cart page .html">Cart</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="page-header">
    <h1>Your Shopping Cart</h1>
  </section>

  <section class="container">
    <div id="cartItems" class="mt-4"></div>
    <h4 class="mt-4">Total: Rs. <span id="totalPrice">0</span></h4>
    <button class="btn btn-warning mt-2" onclick="clearCart()"><i class="bi bi-trash3"></i>Clear Cart</button>
	<a href="checkout.html" class="btn btn-success mt-2 ms-2">
  <i class="bi bi-cart-check"></i> Proceed to Checkout
</a>

  </section>

  <footer>
    &copy; 2025 Velvet Vogue. All rights reserved.
  </footer>

<script>
  function displayCart() {
    const cartItemsDiv = document.getElementById("cartItems");
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    if (cart.length === 0) {
      cartItemsDiv.innerHTML = "<p>Your cart is empty.</p>";
      document.getElementById("totalPrice").innerText = "0";
      return;
    }

    cartItemsDiv.innerHTML = "";

    cart.forEach((item, index) => {
      let rawPrice = item.price;
      let price = 0;

      console.log("Raw price:", rawPrice); // ✅ optional debugging

      if (typeof rawPrice === "string") {
        const priceParts = rawPrice
          .replace(/Rs\.?/gi, '')       // remove Rs. or Rs
          .replace(/\s+/g, '')          // remove spaces
          .split('-')                   // split if range (e.g., "8500-0.45")
          .map(p => {
            const cleaned = p
              .replace(/,/g, '')        // remove commas
              .replace(/(?!\.\d{1,2})\./g, ''); // remove dots not used as decimal
            return parseFloat(cleaned);
          })
          .filter(p => !isNaN(p));

        console.log("Parsed price parts:", priceParts); // ✅ optional debugging

        price = priceParts.length > 0 ? Math.max(...priceParts) : 0;
      } else {
        price = parseFloat(rawPrice);
      }

      total += price;

      const itemDiv = document.createElement("div");
      itemDiv.className = "card mb-3";
      itemDiv.innerHTML = `
        <div class="row g-0">
          <div class="col-md-4">
            <img src="${item.image}" class="img-fluid rounded-start" alt="${item.title}">
          </div>
          <div class="col-md-8">
			 <h5 class="card-title">${item.title}</h5>
            <p class="card-text">Color: ${item.color}, Size: ${item.size}</p>
            <p class="card-text">Price: Rs. ${price.toFixed(2)}</p>
              <button class="btn btn-danger" onclick="removeItem(${index})"><i class="bi bi-x-circle"></i> Remove</button>
            </div>
          </div>
        </div>
      `;
      cartItemsDiv.appendChild(itemDiv);
    });

    document.getElementById("totalPrice").innerText = total.toFixed(2);
	localStorage.setItem("cartTotal", total.toFixed(2)); // store total for checkout

  }

  function removeItem(index) {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
  }

  function clearCart() {
    localStorage.removeItem("cart");
    displayCart();
  }

  window.onload = displayCart;
  
  
  
</script>



</body>
</html>
