<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Velvet Vogue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
   body {
      font-family: Gothic;
      background: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(17, 17, 17, 0.6);
      color: #fff;
      padding: 2.7rem 2rem;
      z-index: 1000;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .checkout-container {
      max-width: 400px;
      margin: 9rem auto;
      padding: 2rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    footer {
      background: #111;
      color: #ccc;
      text-align: center;
      padding: 3rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

<header>
  <h2>Velvet Vogue - Checkout Page</h2>
</header>

<div class="checkout-container">
  <h3>Customer Information</h3>
  <form id="checkoutForm">
    <div class="mb-3">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Phone Number</label>
      <input type="tel" class="form-control" id="phone" required>
    </div>
    <div class="mb-3">
      <label for="address" class="form-label">Shipping Address</label>
      <textarea class="form-control" id="address" rows="2" required></textarea>
    </div>
    <div class="mb-3">
      <label for="payment" class="form-label">Payment Method</label>
      <select class="form-select" id="payment" required>
        <option value="">Select Payment Type</option>
        <option value="visa">Visa Card</option>
        <option value="mastercard">MasterCard</option>
        <option value="amex">American Express</option>
      </select>
    </div>

    <h4 class="mt-4">Order Summary</h4>
    <div id="checkoutItems" class="mt-3"></div>
    <h5 class="mt-3">Total Amount: Rs. <span id="checkoutTotal">0</span></h5>

    <button type="submit" class="btn btn-success mt-4 w-100">Confirm Order</button>
  </form>
</div>

<footer>
  &copy; 2025 Velvet Vogue. All rights reserved.
</footer>

<script>
  function loadCheckout() {
    const items = JSON.parse(localStorage.getItem("cart")) || [];
    const checkoutItemsDiv = document.getElementById("checkoutItems");
    const totalDisplay = document.getElementById("checkoutTotal");
    let total = 0;

    if (items.length === 0) {
      checkoutItemsDiv.innerHTML = "<p>Your cart is empty.</p>";
      totalDisplay.innerText = "0";
      return;
    }

    checkoutItemsDiv.innerHTML = "";

    items.forEach(item => {
      let rawPrice = item.price;
      let price = 0;

      if (typeof rawPrice === "string") {
        const priceParts = rawPrice
          .replace(/Rs\.?/gi, '')
          .replace(/\s+/g, '')
          .split('-')
          .map(p => parseFloat(p.replace(/,/g, '').replace(/(?!\.\d{1,2})\./g, '')))
          .filter(p => !isNaN(p));

        price = priceParts.length > 0 ? Math.max(...priceParts) : 0;
      } else {
        price = parseFloat(rawPrice) || 0;
      }

      total += price;

      const productName = item.name || item.title || "Unnamed Product";

      const itemDiv = document.createElement("div");
      itemDiv.className = "card mb-2";
      itemDiv.innerHTML = `
        <div class="card-body d-flex justify-content-between align-items-center">
          <span>${productName}</span>
          <span>Rs. ${price.toFixed(2)}</span>
        </div>
      `;
      checkoutItemsDiv.appendChild(itemDiv);
    });

    totalDisplay.innerText = total.toFixed(2);
  }

  document.getElementById("checkoutForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const payment = document.getElementById("payment").value;

    if (!name || !email || !address || !phone || !payment) {
      alert("Please fill in all required fields.");
      return;
    }

    localStorage.removeItem("cart");
    localStorage.removeItem("cartTotal");

    window.location.href = "thankyou.html";
  });

  window.onload = loadCheckout;
</script>

</body>
</html>
