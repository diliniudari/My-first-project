<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Velvet Vogue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Gothic;
      background: #f9f9f9;
      color: #333;
    }
    header {
      background: #111;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    .checkout-container {
      max-width: 800px;
      margin: 4rem auto;
      padding: 2rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    footer {
      background: #111;
      color: #ccc;
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

<header>
  <h2>Velvet Vogue - Checkout</h2>
</header>

<div class="checkout-container">
  <h3>Order Summary</h3>
  <div id="checkoutItems" class="mt-3"></div>
  <h4 class="mt-4">Total Amount: Rs. <span id="checkoutTotal">0</span></h4>
  <button class="btn btn-success mt-3" id="confirmBtn">Confirm Order</button>
</div>

<footer>
  &copy; 2025 Velvet Vogue. All rights reserved.
</footer>

<script>
  function loadCheckout() {
    const items = JSON.parse(localStorage.getItem("cart")) || [];
    const checkoutItemsDiv = document.getElementById("checkoutItems");
    const totalDisplay = document.getElementById("checkoutTotal");
    let total = 0;

    if (items.length === 0) {
      checkoutItemsDiv.innerHTML = "<p>Your cart is empty.</p>";
      totalDisplay.innerText = "0";
      return;
    }

    checkoutItemsDiv.innerHTML = "";

    items.forEach(item => {
      let rawPrice = item.price;
      let price = 0;

      if (typeof rawPrice === "string") {
        const priceParts = rawPrice
          .replace(/Rs\.?/gi, '')
          .replace(/\s+/g, '')
          .split('-')
          .map(p => parseFloat(p.replace(/,/g, '').replace(/(?!\.\d{1,2})\./g, '')))
          .filter(p => !isNaN(p));

        price = priceParts.length > 0 ? Math.max(...priceParts) : 0;
      } else {
        price = parseFloat(rawPrice);
      }

      total += price;

      const itemDiv = document.createElement("div");
      itemDiv.className = "card mb-2";
      itemDiv.innerHTML = `
        <div class="card-body d-flex justify-content-between align-items-center">
          <span>${item.title}</span>
          <span>Rs. ${price.toFixed(2)}</span>
        </div>
      `;
      checkoutItemsDiv.appendChild(itemDiv);
    });

    totalDisplay.innerText = total.toFixed(2);
  }

  function confirmOrder() {
    localStorage.removeItem("cart");
    localStorage.removeItem("cartTotal");
    window.location.href = "thankyou.html"; // Redirect to thank you page
  }

  window.onload = function () {
    loadCheckout();
    document.getElementById("confirmBtn").addEventListener("click", confirmOrder);
  };
</script>

</body>
</html>
