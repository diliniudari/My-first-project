<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Velvet Vogue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: Gothic;
      background: #f9f9f9;
      color: #333;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(17, 17, 17, 0.7);
      color: #fff;
      padding: 2.7rem 2rem;
      z-index: 1000;
    }

    nav a {
      color: #fff;
      margin-right: 1rem;
      text-decoration: none;
    }

    .contact-section {
      padding: 7rem 1rem 4rem;
    }

    .contact-section h2 {
      font-weight: bold;
      margin-bottom: 2rem;
    }

    .contact-info i {
      font-size: 1.5rem;
      color: #ee0979;
      margin-right: 0.5rem;
    }

    .form-control, .btn {
      border-radius: 0.5rem;
    }

    footer {
      background: #111;
      color: #ccc;
      padding: 2rem;
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header class="d-flex justify-content-between align-items-center">
    <h2>Velvet Vogue</h2>
    <nav>
      <a href="new velvet vogue .html">Home</a>
      <a href="Women.html">Women</a>
      <a href="men.html">Men</a>
      <a href="kidss.html">Kids</a>
      <a href="Cart page .html">Cart</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="contact-section container" id="contact">
    <h2 class="text-center">Get in Touch</h2>
    <div class="row">
      <div class="col-md-6 mb-4">
        <form action="https://formspree.io/f/mayvldwo" method="POST">
  <div class="mb-3">
    <label for="name" class="form-label">Full Name</label>
    <input type="text" id="name" name="name" class="form-control" required />
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email Address</label>
    <input type="email" id="email" name="email" class="form-control" required />
  </div>
  <div class="mb-3">
    <label for="message" class="form-label">Message</label>
    <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
  </div>
  <button type="submit" class="btn btn-dark w-100">Send Message</button>
</form>

      </div>
      <div class="col-md-6 contact-info">
        <h5><i class="bi bi-geo-alt-fill"></i> Address</h5>
        <p>No. 123, Fashion Street, Colombo 07, Sri Lanka</p>

        <h5><i class="bi bi-envelope-fill"></i> Email</h5>
        <p>support@velvetvogue.lk</p>

        <h5><i class="bi bi-telephone-fill"></i> Phone</h5>
        <p>+94 76 123 4567</p>

        <h5><i class="bi bi-clock-fill"></i> Working Hours</h5>
        <p>Mon - Fri: 9:00 AM - 6:00 PM</p>

        <h5><i class="bi bi-globe"></i> Follow Us</h5>
        <p>
          <a href="#" class="text-dark me-2"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-dark me-2"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-dark"><i class="bi bi-twitter-x"></i></a>
        </p>
      </div>
    </div>
  </section>


  <footer>
    &copy; 2025 Velvet Vogue. All rights reserved.
  </footer>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.querySelector("form");
    form.addEventListener("submit", function () {
      setTimeout(() => {
        alert("Thank you! Your message has been sent successfully.");
      }, 500);
    });
  });
</script>
</body>
</html>
